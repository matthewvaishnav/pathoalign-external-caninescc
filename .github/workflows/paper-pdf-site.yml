name: Build and deploy external validation PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: external-caninescc-paper-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build LaTeX PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Verify PDF
        run: test -s paper/main.pdf

      - name: Create PDF site files
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p paper_pdf_site
          cp paper/main.pdf paper_pdf_site/pathoalign-external-caninescc.pdf
          cp paper/main.pdf paper_pdf_site/external-paired-scanner-validation.pdf
          cp paper/main.pdf paper_pdf_site/canine-scc-pathoalign-validation.pdf
          touch paper_pdf_site/.nojekyll
          cat > paper_pdf_site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=./pathoalign-external-caninescc.pdf">
            <title>PathoAlign External Canine SCC Validation</title>
          </head>
          <body>
            <p><a href="./pathoalign-external-caninescc.pdf">Open the PathoAlign external canine SCC validation PDF</a></p>
            <p><a href="https://github.com/matthewvaishnav/pathoalign-external-caninescc">Open the reproducibility repository</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: paper_pdf_site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
